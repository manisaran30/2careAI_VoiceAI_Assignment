services:
  - type: web
    name: healthcare-ai-backend
    runtime: node
    repo: https://github.com/YOUR_USER/YOUR_REPO
    buildCommand: cd backend && npm install && npx prisma generate && npx tsc
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
