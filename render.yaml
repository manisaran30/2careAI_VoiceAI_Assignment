services:
  - type: web
    name: apollo-ai-backend
    runtime: node
    repo: https://github.com/manisaran30/2careAI_VoiceAI_Assignment
    buildCommand: cd backend && cp prisma/schema.postgres.prisma prisma/schema.prisma && npm install --include=dev && npx prisma generate && npm run build && npx prisma db push && npx prisma db seed
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: BOLNA_API_KEY
        sync: false
      - key: BOLNA_AGENT_ID
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
