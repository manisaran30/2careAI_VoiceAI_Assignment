services:
  - type: web
    name: apollo-ai-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cp prisma/schema.postgres.prisma prisma/schema.prisma && npm install --include=dev && npx prisma generate && npm run build && npx prisma db push && npx prisma db seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: BOLNA_API_KEY
        sync: false
      - key: BOLNA_AGENT_ID
        sync: false
